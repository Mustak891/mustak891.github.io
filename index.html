<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>McAi Player – HD Video & Music Player</title>
<meta name="description" content="Premium HD video and music player with AI features, ultra smooth playback, and advanced controls.">

<!-- 🔒 FORCE HTTPS -->
<script>
if (location.protocol !== 'https:') {
  location.replace('https://' + location.hostname + location.pathname);
}
</script>

<!-- 🔐 FIX MIXED CONTENT -->
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

<!-- 🎯 FAVICON -->
<link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">

<!-- 🚀 SEO -->
<meta name="theme-color" content="#ff6a00">
<meta property="og:title" content="McAi Player – HD Video Player">
<meta property="og:description" content="AI-powered video & music player with smooth playback">
<meta property="og:image" content="https://mcaiplayer.me/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* 🔥 3D BG */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 10%;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:40px;
  border-radius:10px;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10%;
  flex-wrap:wrap;
}

.hero h1{
  font-size:60px;
  background:linear-gradient(45deg,#ff6a00,#ff9500);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  color:#aaa;
  margin-top:10px;
}

.btn{
  margin-top:20px;
  padding:15px 30px;
  background:linear-gradient(45deg,#ff6a00,#ff9500);
  border-radius:12px;
  text-decoration:none;
  color:white;
  display:inline-block;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 40px rgba(255,106,0,0.6);
}

/* PHONE */
.phone{
  width:280px;
  height:560px;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,0.9);
  transition:0.2s;
}

.phone img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* FEATURES */
.section{
  padding:100px 10%;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.4s;
  transform:translateY(50px);
  opacity:0;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
}

/* SCREENSHOTS */
.screens{
  display:flex;
  gap:20px;
  padding:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.screens img{
  height:420px;
  border-radius:20px;
  transition:0.3s;
}

.screens img:hover{
  transform:scale(1.05);
}

/* CTA */
.cta{
  text-align:center;
  padding:100px 20px;
}

footer{
  text-align:center;
  padding:30px;
  color:#777;
}

/* 📱 MOBILE */
@media (max-width: 768px){

  .hero{
    flex-direction:column;
    text-align:center;
    gap:40px;
    padding:40px 20px;
  }

  .hero h1{
    font-size:36px;
  }

  .phone{
    width:220px;
    height:440px;
  }

  .nav{
    padding:15px 20px;
  }

  .section{
    padding:60px 20px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .screens{
    flex-direction:column;
    align-items:center;
  }

  .screens img{
    width:90%;
    height:auto;
  }
}
</style>

</head>

<body>

<canvas id="bg"></canvas>

<!-- NAV -->
<div class="nav">
  <div class="logo">
    <img src="logo.png">
    <b>McAi Player</b>
  </div>
</div>

<!-- HERO -->
<section class="hero">

  <div>
    <h1>Media Player Reimagined</h1>
    <p>AI-powered playback. Ultra smooth performance. Built for perfection.</p>
    <a href="https://play.google.com/store/apps/details?id=app.mcai.videoplayer" class="btn">Download</a>
  </div>

  <div class="phone" id="phone">
    <img id="slider" src="video.png">
  </div>

</section>

<!-- FEATURES -->
<section class="section">
  <div class="grid">
    <div class="card">🤖 AI Scene Intelligence</div>
    <div class="card">🎬 Smooth Playback Engine</div>
    <div class="card">🎧 Advanced Audio System</div>
    <div class="card">⚡ High Performance</div>
  </div>
</section>

<!-- SCREENSHOTS -->
<section class="section">
  <div class="screens">
    <img src="video.png">
    <img src="audio.png">
    <img src="controls.png">
    <img src="ai.png">
  </div>
</section>

<!-- CTA -->
<section class="cta">
  <h2>Experience the Future</h2>
  <a href="https://play.google.com/store/apps/details?id=app.mcai.videoplayer" class="btn">Install Now</a>
</section>

<footer>© 2026 McAi Player</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* 🔥 3D BG */
let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
let renderer=new THREE.WebGLRenderer({canvas:document.getElementById('bg'),alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);

let geometry=new THREE.BufferGeometry();
let vertices=[];

let count = window.innerWidth < 768 ? 1200 : 2500;

for(let i=0;i<count;i++){
  vertices.push((Math.random()*2-1)*5);
  vertices.push((Math.random()*2-1)*5);
  vertices.push((Math.random()*2-1)*5);
}

geometry.setAttribute('position',new THREE.Float32BufferAttribute(vertices,3));

let material=new THREE.PointsMaterial({color:0xff6a00,size:0.02});
let particles=new THREE.Points(geometry,material);

scene.add(particles);
camera.position.z=3;

function animate(){
  requestAnimationFrame(animate);
  particles.rotation.y+=0.001;
  renderer.render(scene,camera);
}
animate();

/* 📱 SLIDER */
const imgs=["video.png","audio.png","controls.png","ai.png"];
let i=0;

setInterval(()=>{
  i=(i+1)%imgs.length;
  document.getElementById("slider").src=imgs[i];
},2500);

/* 💻 TILT (desktop only) */
const phone=document.getElementById("phone");

if(window.innerWidth > 768){
  document.addEventListener("mousemove",(e)=>{
    let x=(window.innerWidth/2-e.clientX)/40;
    let y=(window.innerHeight/2-e.clientY)/40;
    phone.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
  });
}

/* ✨ SCROLL ANIMATION */
const cards=document.querySelectorAll(".card");

window.addEventListener("scroll",()=>{
  cards.forEach(card=>{
    let top=card.getBoundingClientRect().top;
    if(top<window.innerHeight-100){
      card.style.opacity=1;
      card.style.transform="translateY(0)";
    }
  });
});
</script>

</body>
</html>
