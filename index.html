<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>McAi Player – HD Video & Music Player</title>
<meta name="description" content="Powerful HD video and music player with AI features and smooth playback.">

<link rel="icon" type="image/png" sizes="32x32" href="logo.png">
<link rel="shortcut icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>
body { margin: 0; }
canvas { display: block; }
</style>
</head>
<body>
    <h1>Welcome to the McAi Player 3D Experience</h1>
    <p>Explore our interactive 3D scenes!</p>
    <div id="animation-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('animation-container').appendChild(renderer.domElement);

            // Adding a particle effect
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 10000; i++) {
                const x = Math.random() * 2 - 1;
                const y = Math.random() * 2 - 1;
                const z = Math.random() * 2 - 1;
                vertices.push(x, y, z);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

            const particleMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
            const particles = new THREE.Points(geometry, particleMaterial);
            scene.add(particles);

            camera.position.z = 5;

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.x += 0.01;
            particles.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
